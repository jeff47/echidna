services:
  echidna:
    build:
      context: .
      args:
        ECHIDNA_BUILD_DATETIME: ${ECHIDNA_BUILD_DATETIME:-unknown}
        ECHIDNA_APP_COMMIT: ${ECHIDNA_APP_COMMIT:-unknown}
    container_name: echidna
    restart: unless-stopped
    env_file:
      - .runtime/echidna.env
    environment:
      ECHIDNA_RUNS_DIR: /app/.runtime/runs
    volumes:
      - echidna_runtime:/app/.runtime
    expose:
      - "8001"
    networks:
      - docker_shared
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
  echidna_proxy:
    image: nginx:1.27-alpine
    container_name: echidna_proxy
    restart: unless-stopped
    depends_on:
      - echidna
    volumes:
      - ./nginx/echidna.conf:/etc/nginx/conf.d/default.conf:ro
    expose:
      - "8080"
    networks:
      - docker_shared
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8080/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  echidna_runtime:

networks:
  docker_shared:
    external: true
