<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ECHIDNA</title>
  <style>
    :root {
      --bg: #f4f5f7;
      --card: #ffffff;
      --text: #1f2933;
      --muted: #52606d;
      --accent: #0f766e;
      --border: #d9e2ec;
    }
    * { box-sizing: border-box; }
    body { font-family: "Source Sans 3", "Segoe UI", sans-serif; margin: 0; background: var(--bg); color: var(--text); }
    main { max-width: 960px; margin: 2rem auto; padding: 0 1rem; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; }
    h1 { margin-top: 0; }
    .brand { display: flex; align-items: center; gap: 1rem; margin-bottom: 0.4rem; }
    .brand img { width: 92px; height: 92px; object-fit: cover; border-radius: 12px; border: 1px solid var(--border); }
    .brand .tagline { margin: 0.35rem 0 0; font-size: 0.95rem; }
    .brand .tagline strong { font-weight: 700; }
    label { display: block; margin: 0.75rem 0 0.25rem; font-weight: 600; }
    input, textarea, select { width: 100%; padding: 0.6rem; border: 1px solid var(--border); border-radius: 8px; font-size: 1rem; background: white; }
    .author-label { font-size: 0.92rem; }
    .author-input { max-width: 22rem; font-size: 0.92rem; padding: 0.5rem; }
    .year-select { width: 10rem; max-width: 100%; }
    .identity-row { display: grid; grid-template-columns: minmax(12rem, 15.5rem) minmax(12rem, 18rem); gap: 0.6rem; align-items: end; }
    .identity-field { display: flex; flex-direction: column; min-width: 0; }
    .identity-field .author-input { width: 100%; max-width: none; }
    .checkbox-row { display: flex; align-items: center; gap: 0.5rem; font-weight: 600; }
    .checkbox-row input[type="checkbox"] { width: auto; padding: 0; margin: 0; border: none; }
    .year-row { display: flex; align-items: flex-end; gap: 0.6rem; flex-wrap: wrap; }
    .year-field { display: flex; flex-direction: column; }
    .year-field label { margin-top: 0.75rem; }
    .year-inline-toggle { margin: 0 0 0.1rem; white-space: nowrap; }
    .inline-label { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
    .inline-label a { font-size: 0.88rem; color: #0f766e; text-decoration: none; }
    .inline-label a:hover { text-decoration: underline; }
    button { margin-top: 1rem; background: var(--accent); color: white; border: none; padding: 0.65rem 1rem; border-radius: 8px; cursor: pointer; }
    .error { color: #b42318; margin-top: 0.5rem; }
    @media (max-width: 700px) {
      .year-row { align-items: stretch; }
      .identity-row { grid-template-columns: 1fr; align-items: stretch; }
      .author-input { max-width: 100%; }
    }
  </style>
</head>
<body>
<main>
  <div class="card">
    <div class="brand">
      <img src="/echidna.jpg" alt="ECHIDNA logo">
      <div>
        <h1>ECHIDNA</h1>
        <p class="tagline"><strong>E</strong>xtract <strong>C</strong>itations, <strong>H</strong>andle <strong>I</strong>nstitutional <strong>D</strong>ata, and <strong>N</strong>ormalize <strong>A</strong>uthors.</p>
      </div>
    </div>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
    <form method="post" action="/disambiguate" enctype="multipart/form-data">
      <div class="identity-row">
        <div class="identity-field name">
          <label for="author_name" class="author-label">Author Name</label>
          <input id="author_name" class="author-input" name="author_name" value="{{ author_name }}" required>
        </div>
        <div class="identity-field orcid">
          <label for="author_orcid" class="author-label">Author <a href="https://orcid.org/" target="_blank" rel="noopener">ORCiD</a> (optional)</label>
          <input id="author_orcid" class="author-input" name="author_orcid" value="{{ author_orcid }}" placeholder="0000-0000-0000-0000">
        </div>
      </div>

      <div class="year-row">
        <div class="year-field">
          <label for="start_year">Start Year</label>
          <select id="start_year" name="start_year" class="year-select" required>
            {% for year in year_options %}
              <option value="{{ year }}" {% if year == start_year %}selected{% endif %}>{{ year }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="year-field">
          <label for="end_year">End Year</label>
          <select id="end_year" name="end_year" class="year-select" required>
            {% for year in year_options %}
              <option value="{{ year }}" {% if year == end_year %}selected{% endif %}>{{ year }}</option>
            {% endfor %}
          </select>
        </div>
        <label class="checkbox-row year-inline-toggle">
          <input id="all_years" type="checkbox" name="all_years" value="1" {% if all_years %}checked{% endif %}>
          Include all years (ignore year filter)
        </label>
      </div>

      <label for="pmids">PMID List</label>
      <textarea id="pmids" name="pmids" rows="10" placeholder="One PMID per line, or pasted text containing PMIDs">{{ pmids }}</textarea>

      <label for="pmid_file">PMID File (optional)</label>
      <input id="pmid_file" name="pmid_file" type="file" accept=".txt,text/plain">

      <label class="checkbox-row">
        <input type="checkbox" name="peer_reviewed_only" value="1" {% if peer_reviewed_only %}checked{% endif %}>
        Peer-reviewed only (exclude preprints, editorials, comments, letters, news, etc.)
      </label>

      <label for="extra_excluded_types" class="inline-label">
        Extra Publication Types To Ignore (optional)
        <a href="https://www.nlm.nih.gov/mesh/pubtypes.html" target="_blank" rel="noopener">Publication type reference</a>
      </label>
      <input id="extra_excluded_types" name="extra_excluded_types" value="{{ extra_excluded_types }}" placeholder="e.g. case reports, congresses">

      <button type="submit">Find Author Clusters</button>
    </form>
  </div>
</main>
</body>
</html>
