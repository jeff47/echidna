limit_req_zone $binary_remote_addr zone=disambiguate_limit:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=orcid_search_limit:10m rate=20r/m;

upstream echidna_app {
    server echidna:8001;
    keepalive 16;
}

server {
    listen 8080;
    server_name _;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";

    location = /disambiguate {
        limit_req zone=disambiguate_limit burst=2 nodelay;
        proxy_pass http://echidna_app;
    }

    location = /orcid-search {
        limit_req zone=orcid_search_limit burst=10 nodelay;
        proxy_pass http://echidna_app;
    }

    location / {
        proxy_pass http://echidna_app;
    }
}
